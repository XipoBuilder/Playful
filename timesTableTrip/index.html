<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 乘法口诀大冒险 · PC版</title>
<style>
/* ================================================================
   CSS 变量：三色简洁配色体系
   --c1: 粉（主强调色，用于重点按钮、Boss血条、选中态）
   --c2: 绿（成功色，用于正确反馈、完成标记、开始按钮）
   --c3: 蓝（中性色，用于信息展示、普通卡片、消消乐/矩阵卡片）
================================================================ */
:root {
  --c1: #f472b6; --c2: #34d399; --c3: #38bdf8;
  --bg: #f8fafc; --card: #ffffff; --text: #334155; --sub: #94a3b8;
  --sh: 0 4px 28px rgba(0,0,0,0.06);
}

/* ================================================================
   全局重置 & 页面背景（柔光渐变）
================================================================ */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
  background:linear-gradient(170deg,#f0f9ff 0%,#fdf2f8 40%,#f0fdf4 100%);
  min-height:100vh;display:flex;justify-content:center;align-items:center;
}

/* ================================================================
   背景浮动泡泡（纯装饰，pointer-events:none不阻挡交互）
================================================================ */
.bg-bubble{
  position:fixed;pointer-events:none;z-index:0;border-radius:50%;opacity:0.22;
  animation:floatBubble 8s ease-in-out infinite;
}
.bg-bubble:nth-child(1){width:280px;height:280px;background:radial-gradient(circle,#f472b644,#38bdf822);top:2%;left:2%;}
.bg-bubble:nth-child(2){width:220px;height:220px;background:radial-gradient(circle,#38bdf844,#34d39922);top:50%;right:2%;animation-delay:-3s;}
.bg-bubble:nth-child(3){width:190px;height:190px;background:radial-gradient(circle,#34d39944,#f472b622);bottom:5%;left:6%;animation-delay:-5s;}
.bg-bubble:nth-child(4){width:240px;height:240px;background:radial-gradient(circle,#f472b633,#38bdf822);top:16%;right:6%;animation-delay:-2s;}
.bg-bubble:nth-child(5){width:160px;height:160px;background:radial-gradient(circle,#34d39933,#f472b622);top:68%;right:18%;animation-delay:-6s;}
@keyframes floatBubble{0%,100%{transform:translateY(0)scale(1);}50%{transform:translateY(-45px)scale(1.05);}}

/* ================================================================
   主容器 #app：柔性列布局，居中定位，圆角+投影
================================================================ */
#app{
  width:98vw;max-width:1700px;height:96vh;max-height:none;
  background:var(--card);border-radius:28px;
  box-shadow:0 8px 56px rgba(0,0,0,0.06),0 0 0 1px rgba(150,180,200,0.08);
  position:relative;z-index:1;overflow:hidden;
  display:flex;flex-direction:column;
}

/* ================================================================
   屏幕切换系统：所有 .screen 默认隐藏，.active 显示
================================================================ */
.screen{display:none;flex-direction:column;width:100%;height:100%;overflow-y:auto;overflow-x:hidden;}
.screen.active{display:flex;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(100,120,160,0.14);border-radius:3px;}

/* ================================================================
   通用按钮 .btn：圆角胶囊型，hover上浮+投影加深，active按压缩小
   变体：.btn-p(粉) .btn-g(绿) .btn-b(蓝) .btn-o(白描边)
================================================================ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:12px;
  padding:24px 48px;border-radius:50px;border:none;
  font-size:1.5em;font-weight:700;cursor:pointer;
  transition:all 0.22s;white-space:nowrap;
  box-shadow:0 6px 20px rgba(0,0,0,0.06);
}
.btn:hover{transform:translateY(-4px);box-shadow:0 14px 36px rgba(0,0,0,0.12);}
.btn:active{transform:scale(0.96);}
.btn-p{background:var(--c1);color:white;}
.btn-g{background:var(--c2);color:white;}
.btn-b{background:var(--c3);color:white;}
.btn-o{background:white;color:var(--text);border:2px solid #e2e8f0;}
.btn-lg{padding:32px 68px;font-size:2em;}
.btn-sm{padding:16px 32px;font-size:1.2em;}

/* ================================================================
   顶栏 .header-bar：关卡/分数/时间 信息条
================================================================ */
.header-bar{
  display:flex;align-items:center;gap:24px;flex-shrink:0;
  padding:22px 36px;background:rgba(255,255,255,0.9);
  backdrop-filter:blur(12px);border-bottom:1px solid #f1f5f9;
}
.header-tag{
  padding:14px 28px;border-radius:18px;font-size:1.45em;font-weight:700;
  background:#f1f5f9;color:var(--text);
  display:flex;align-items:center;gap:10px;white-space:nowrap;
}
.header-tag.score{background:#fef3c7;color:#d97706;}
.header-tag.timer{background:#d1fae5;color:#059669;}
/* 倒计时≤10秒时闪烁警告 */
.header-tag.warn{animation:warnPulse 0.7s ease-in-out infinite;}
@keyframes warnPulse{0%,100%{background:#d1fae5;}50%{background:#fee2e2;color:#dc2626;}}

/* ================================================================
   主菜单 #menuScreen · 清新自然风格
   柔和渐变底色 + 居中Logo → 标题 → 设置 → 双卡片
================================================================ */
#menuScreen{
  align-items:center;justify-content:center;
  background:linear-gradient(170deg,#fafcf9 0%,#f5f8fb 40%,#faf7fc 70%,#f6fafd 100%);
  padding:20px 40px 24px;gap:12px;
}
.menu-header{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:2px;}
.menu-logo{font-size:4.8em;animation:bounce 2.4s ease-in-out infinite;filter:drop-shadow(0 6px 20px rgba(160,140,200,0.2));line-height:1;}
.menu-title{font-size:4em;font-weight:900;color:#2d3340;letter-spacing:3px;line-height:1;}
.menu-subtitle{font-size:1.35em;color:#8b9cb0;margin-bottom:18px;font-weight:500;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-18px);}}

/* 设置栏：磨砂玻璃质感 */
.settings-bar{
  display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;
  background:rgba(255,255,255,0.65);backdrop-filter:blur(14px);
  border-radius:18px;padding:14px 28px;margin-bottom:22px;
  font-size:1.1em;width:100%;max-width:700px;
  box-shadow:0 2px 12px rgba(0,0,0,0.04);border:1px solid rgba(200,210,220,0.25);
}
.settings-bar .lbl{color:#556677;font-weight:600;white-space:nowrap;}
.settings-bar .sep{width:1px;height:22px;background:#dce3eb;}
.range-sel{padding:8px 14px;border-radius:10px;border:1px solid #dce3eb;background:white;font-size:1em;font-weight:600;color:#2d3340;text-align:center;outline:none;min-width:64px;cursor:pointer;transition:border 0.2s;}
.range-sel:focus{border-color:#a78bfa;}
/* 游戏内时长选择器 */
.time-sel{padding:6px 10px;border-radius:10px;border:1px solid #dce3eb;background:white;font-size:0.9em;font-weight:600;color:#2d3340;outline:none;cursor:pointer;}
.time-sel:focus{border-color:var(--c1);}
select.sel,input.inp{
  padding:10px 16px;border-radius:10px;border:1px solid #dce3eb;background:white;
  font-size:1em;font-weight:600;color:var(--text);text-align:center;outline:none;
  min-width:56px;
}
select.sel{max-width:88px;}
select.sel:focus,input.inp:focus{border-color:#a78bfa;}
input.inp{-moz-appearance:textfield;appearance:textfield;width:68px;}
input.inp::-webkit-outer-spin-button,input.inp::-webkit-inner-spin-button{-webkit-appearance:none;}

/* 模式卡片：清新双栏并排，按钮竖排 */
.mode-cards{display:flex;gap:20px;width:100%;max-width:1200px;flex-wrap:wrap;}
.mode-card{
  flex:1;min-width:280px;border-radius:24px;
  padding:28px 28px 26px;
  box-shadow:0 3px 22px rgba(0,0,0,0.04);
  transition:all 0.35s;position:relative;overflow:hidden;
  border:1px solid rgba(180,190,210,0.15);
}
.mode-card.mem-card{background:linear-gradient(170deg,#fbf7fe 0%,#fefefe 45%,#fef5fb 100%);}
.mode-card.game-card{background:linear-gradient(170deg,#f4f9fe 0%,#fefefe 45%,#f5fef8 100%);}
.mode-card.app-card{background:linear-gradient(170deg,#fff7ed 0%,#fefefe 45%,#fefce8 100%);}
.mode-card:hover{transform:translateY(-5px);box-shadow:0 12px 40px rgba(0,0,0,0.09);}
.mode-card .card-icon{font-size:2.8em;margin-bottom:8px;text-align:center;}
.mode-card h3{font-size:1.9em;color:#2d3340;margin-bottom:4px;text-align:center;font-weight:800;}
.mode-card .desc{font-size:1.1em;color:#7b8da0;margin-bottom:20px;text-align:center;line-height:1.4;}
.mode-card .btns{display:flex;flex-direction:column;gap:10px;}
.mode-card .btns .btn{width:100%;justify-content:center;padding:18px 36px;font-size:1.3em;}

/* ================================================================
   记忆模式 #memoryScreen
   包含：三角形堆叠（顺次/倒背）、乱序网格
================================================================ */
#memoryScreen{background:linear-gradient(180deg,#fdf2f8 0%,#f8fafc 50%,#f0f9ff 100%);}
.mem-body{flex:1;overflow-y:auto;padding:24px 36px 20px;display:flex;flex-direction:column;gap:20px;}
.mem-body h2{font-size:2.2em;color:var(--text);text-align:center;}
.mem-body .desc{text-align:center;color:var(--sub);font-size:1.3em;}

/* 三角形堆叠容器：CSS Grid精确列对齐，不再使用flex-wrap */
.mem-triangle{display:grid;gap:8px;width:100%;}
/* 移除旧行容器样式，单元格直接置于grid中 */
.mem-tri-row{display:none;}
.mem-cell{
  padding:22px 34px;background:#f8fafc;
  border-radius:18px;font-size:1.65em;font-weight:700;color:var(--text);
  cursor:pointer;transition:all 0.2s;text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);min-width:140px;
  border:2px solid transparent;white-space:nowrap;
}
.mem-cell:hover{transform:scale(1.06);box-shadow:0 6px 20px rgba(0,0,0,0.08);border-color:var(--c1);}
/* 正在朗读的卡片高亮 */
.mem-cell.reading{background:#fef3c7!important;transform:scale(1.09);border-color:#fbbf24;}

/* 大范围紧凑模式：自动缩小卡片，横向自动换行防溢出 */
.mem-compact .mem-triangle{gap:5px;}
.mem-compact .mem-cell{padding:10px 16px;font-size:1.1em;min-width:80px;border-radius:10px;}
.mem-compact .mem-rand{gap:10px;}
.mem-compact .mem-rand{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));}
.mem-compact .mem-rand .mem-cell{font-size:1.1em;padding:12px 10px;}

/* 乱序记忆网格 */
.mem-rand{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:18px;max-width:1100px;margin:0 auto;width:100%;}
.mem-rand .mem-cell{font-size:1.5em;padding:20px 18px;}
.mem-footer{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;padding:10px 0 6px;flex-shrink:0;}

/* ================================================================
   随堂练习 #practiceScreen · 居中卡片式问答（记忆模式专属）
   布局：柔光背景 + 白色卡片容器 + 进度条→大字算式→输入行→反馈
================================================================ */
#practiceScreen{background:linear-gradient(180deg,#fdf2f8 0%,#f8fafc 40%,#f0fdf4 100%);}
.prac-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:36px 56px;}
.prac-card{background:white;border-radius:32px;padding:44px 64px 38px;box-shadow:0 6px 36px rgba(0,0,0,0.06);display:flex;flex-direction:column;align-items:center;gap:24px;min-width:480px;}
.prac-progress-outer{width:100%;max-width:600px;height:12px;background:#e2e8f0;border-radius:6px;overflow:hidden;flex-shrink:0;}
.prac-progress-inner{height:100%;background:linear-gradient(90deg,#f472b6,#34d399);border-radius:6px;transition:width 0.4s;}
.prac-q{font-size:6em;font-weight:900;color:var(--text);letter-spacing:8px;text-align:center;}
.prac-input-row{display:flex;align-items:center;gap:18px;}
.prac-input{width:280px;padding:20px 30px;border-radius:18px;border:3px solid #e2e8f0;font-size:3em;font-weight:700;text-align:center;outline:none;color:var(--text);background:#f8fafc;}
.prac-input:focus{border-color:var(--c1);box-shadow:0 0 24px rgba(244,114,182,0.15);background:white;}
.prac-input::-webkit-outer-spin-button,.prac-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.prac-input{-moz-appearance:textfield;appearance:textfield;}
.prac-btn{font-size:1.5em;font-weight:800;padding:20px 44px;border-radius:18px;border:none;cursor:pointer;background:linear-gradient(135deg,#34d399,#059669);color:white;box-shadow:0 6px 22px rgba(52,211,153,0.4);transition:all 0.25s;}
.prac-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(52,211,153,0.45);}
.prac-msg{min-height:44px;font-size:1.35em;font-weight:700;text-align:center;}
.prac-stats{color:var(--sub);font-size:1.2em;}

/* ================================================================
   打怪模式 #battleScreen · 彩虹大作战
   蓝天白云草地 + 英雄(左) vs 怪兽(右) + 中央答题卡
================================================================ */
#battleScreen{
  background:linear-gradient(180deg,#7EC8E3 0%,#A8D8EA 25%,#C5E8C5 72%,#8ED88E 100%);
  position:relative;overflow:hidden;
}
/* 白云 */
.battle-cloud{
  position:absolute;pointer-events:none;z-index:0;
  background:rgba(255,255,255,0.78);border-radius:50%;
  animation:cloudDrift 20s ease-in-out infinite;
}
.battle-cloud::before{
  content:'';position:absolute;width:65%;height:70%;
  background:rgba(255,255,255,0.78);border-radius:50%;
  top:-38%;left:8%;
}
.battle-cloud::after{
  content:'';position:absolute;width:50%;height:58%;
  background:rgba(255,255,255,0.78);border-radius:50%;
  top:-28%;right:10%;
}
@keyframes cloudDrift{0%,100%{transform:translateX(0);}50%{transform:translateX(35px);}}

/* 草地 */
.battle-ground{
  position:absolute;bottom:0;left:-5%;right:-5%;height:22%;
  background:linear-gradient(180deg,#7ED87E 0%,#5DBE5D 35%,#3D8E3D 100%);
  border-radius:55% 60% 0 0 / 35% 35% 0 0;
  z-index:0;pointer-events:none;
}

/* 对战区域：水平三栏 (英雄-答题-怪兽) */
.battle-arena{
  flex:1;display:flex;align-items:center;justify-content:space-around;
  position:relative;z-index:1;padding:8px 20px;gap:10px;
}

/* === 英雄(左) === */
.battle-hero{display:flex;flex-direction:column;align-items:center;z-index:2;}
.hero-sprite{
  font-size:7.5em;filter:drop-shadow(0 8px 24px rgba(52,211,153,0.35));
  animation:heroBounce 2.8s ease-in-out infinite;line-height:1;
}
@keyframes heroBounce{
  0%,100%{transform:translateY(0)scale(1);}
  25%{transform:translateY(-14px)scale(1.05);}
  55%{transform:translateY(-5px)scale(1.02);}
}

/* === 怪兽(右) === */
.battle-monster{display:flex;flex-direction:column;align-items:center;z-index:2;gap:6px;}
.monster-sprite{
  font-size:8.5em;filter:drop-shadow(0 8px 28px rgba(244,114,182,0.4));
  animation:monsterWiggle 3.2s ease-in-out infinite;line-height:1;transition:all 0.3s;
}
@keyframes monsterWiggle{
  0%,100%{transform:translateY(0)rotate(-2deg);}
  30%{transform:translateY(-8px)rotate(2deg)scale(1.03);}
  65%{transform:translateY(-3px)rotate(-1deg);}
}
.monster-sprite.hit{animation:monsterHit 0.5s ease-out!important;filter:brightness(3)drop-shadow(0 0 50px #ef4444)!important;}
@keyframes monsterHit{0%{transform:scale(1);}18%{transform:scale(2.3)rotate(22deg);}100%{transform:scale(1)rotate(0);}}
.monster-sprite.dodge{animation:monsterDodge 0.45s ease-out!important;}
@keyframes monsterDodge{0%{transform:translateX(0);}22%{transform:translateX(var(--dd));}100%{transform:translateX(0);}}

/* HP条 */
.battle-hp-outer{
  width:210px;height:18px;background:rgba(0,0,0,0.1);border-radius:9px;
  overflow:hidden;border:1.5px solid rgba(244,114,182,0.25);
  box-shadow:inset 0 2px 4px rgba(0,0,0,0.08);
}
.battle-hp-inner{
  height:100%;background:linear-gradient(90deg,#f472b6,#f97316,#fbbf24);
  border-radius:9px;transition:width 0.5s;box-shadow:0 0 12px rgba(244,114,182,0.35);
}
.battle-hp-lbl{font-size:0.85em;color:#b45309;font-weight:700;}

/* === 答题卡片(中) === */
.battle-qzone{display:flex;flex-direction:column;align-items:center;gap:8px;z-index:3;}
.battle-qcard{
  background:white;border-radius:24px;padding:18px 38px;
  box-shadow:0 8px 44px rgba(0,0,0,0.08),0 0 0 1px rgba(0,0,0,0.03);
  display:flex;flex-direction:column;align-items:center;gap:12px;
  animation:qcardFloat 4.5s ease-in-out infinite;
}
@keyframes qcardFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.battle-qnum{font-size:4.2em;font-weight:900;color:#334155;letter-spacing:6px;}
.battle-qinput{
  width:260px;padding:16px 24px;border-radius:14px;
  border:3px solid #e2e8f0;font-size:2.5em;font-weight:700;
  text-align:center;outline:none;color:#334155;background:#f8fafc;
}
.battle-qinput:focus{border-color:var(--c1);box-shadow:0 0 22px rgba(244,114,182,0.18);background:white;}
.battle-qinput::-webkit-outer-spin-button,.battle-qinput::-webkit-inner-spin-button{-webkit-appearance:none;}
.battle-qinput{-moz-appearance:textfield;appearance:textfield;}
.battle-qmsg{min-height:26px;font-size:1.1em;font-weight:700;}

/* 武器+发射 */
.battle-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;}
.battle-weapon-icon{font-size:2em;transition:all 0.3s;}
.battle-weapon-btn{
  font-size:0.9em;padding:6px 14px;border-radius:8px;
  border:1px solid #dce3eb;background:white;cursor:pointer;
  font-weight:600;transition:all 0.2s;color:#556677;
}
.battle-weapon-btn:hover{background:#f1f5f9;border-color:#c4b5fd;}

/* ================================================================
   能量弹攻击动画（保留旧类名，JS引用）
================================================================ */
.bolt-fly{position:absolute;z-index:200;pointer-events:none;font-size:3.2em;transition:none;}
.bolt-hit{position:absolute;z-index:210;pointer-events:none;font-size:10em;animation:flashBoom 0.6s ease-out forwards;}
@keyframes flashBoom{0%{transform:scale(0.05);opacity:1;}40%{transform:scale(2.2);opacity:1;}100%{transform:scale(4);opacity:0;}}
.boom-particle{position:absolute;z-index:215;pointer-events:none;font-size:2.4em;animation:particleBurst 0.7s ease-out forwards;}
@keyframes particleBurst{0%{transform:translate(0,0)scale(0.3);opacity:1;}100%{transform:translate(var(--dx),var(--dy))scale(1.5);opacity:0;}}
.score-pop{position:absolute;z-index:220;pointer-events:none;font-weight:900;font-size:2.6em;color:#fbbf24;text-shadow:0 0 24px rgba(251,191,36,0.6);animation:scPop 1s ease-out forwards;}
@keyframes scPop{0%{transform:translateY(0);opacity:1;}100%{transform:translateY(-120px);opacity:0;}}
.combo-pop{position:absolute;z-index:230;pointer-events:none;font-size:3.6em;font-weight:900;color:#fbbf24;text-shadow:0 0 36px rgba(251,191,36,0.7);animation:cbPop 1.1s ease-out forwards;}
@keyframes cbPop{0%{transform:scale(0.3)translateY(0);opacity:0;}15%{transform:scale(1.6)translateY(-16px);opacity:1;}100%{transform:scale(0.5)translateY(-120px);opacity:0;}}
/* 撒花 */
.confetti{position:fixed;pointer-events:none;z-index:1000;animation:confettiFall var(--dur) linear forwards;}
@keyframes confettiFall{0%{transform:translateY(-50px)rotate(0);opacity:1;}80%{opacity:0.8;}100%{transform:translateY(105vh)rotate(var(--rot));opacity:0;}}

/* ================================================================
   消消乐 #matchScreen · 卡片自动填充网格，配对消失/抖动
================================================================ */
#matchScreen{background:linear-gradient(180deg,#f0fdf4 0%,#f8fafc 40%,#fdf2f8 100%);}
.match-body{flex:1;overflow-y:auto;padding:20px 32px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;}
.match-dots{display:flex;gap:12px;margin-bottom:6px;flex-wrap:wrap;justify-content:center;}
.match-dot{width:20px;height:20px;border-radius:50%;background:#e2e8f0;transition:all 0.3s;}
.match-dot.done{background:var(--c2);box-shadow:0 0 12px rgba(52,211,153,0.6);}

/* 卡片网格：6×6固定排列，整齐划一 */
.match-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:22px;width:100%;max-width:100%;}
.m-card{
  padding:32px 18px;border-radius:24px;background:var(--c3);color:white;
  font-weight:700;font-size:1.65em;text-align:center;
  cursor:pointer;transition:all 0.25s;user-select:none;
  border:2px solid rgba(255,255,255,0.28);
  min-height:110px;display:flex;align-items:center;justify-content:center;
}
.m-card:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(56,189,248,0.35);}
.m-card.picked{background:var(--c1)!important;color:white!important;border-color:white;transform:scale(1.08);}
.m-card.paired{animation:cardGone 0.5s ease-out forwards;pointer-events:none;}
.m-card.wrong{animation:cardShake 0.4s ease-in-out;background:#ef4444!important;}
@keyframes cardGone{0%{transform:scale(1);opacity:1;}50%{transform:scale(1.35);opacity:0.5;}100%{transform:scale(0);opacity:0;}}
@keyframes cardShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-9px);}75%{transform:translateX(9px);}}

/* ================================================================
   矩阵填空 #matrixScreen · 乘法表 + 高亮空格 + 四选一
================================================================ */
#matrixScreen{background:linear-gradient(180deg,#f0f9ff 0%,#f8fafc 40%,#f0fdf4 100%);}
.matrix-body{flex:1;overflow-y:visible;padding:14px 32px 12px;display:flex;flex-direction:column;align-items:center;gap:10px;justify-content:space-evenly;}
.mx-q-big{font-size:2.4em;font-weight:800;color:var(--text);text-align:center;background:white;padding:16px 44px;border-radius:22px;box-shadow:var(--sh);}

/* 矩阵表格 */
.mx-table{border-collapse:separate;border-spacing:6px;margin:0 auto;font-size:1.1em;}
.mx-table th{padding:14px 16px;border-radius:14px;color:white;font-weight:700;background:var(--c3);font-size:1.05em;}
.mx-table .corner{background:var(--c1);}
.mx-table .rhead{background:var(--c3);}
.mx-table td{width:74px;height:52px;border-radius:12px;text-align:center;background:rgba(56,189,248,0.08);cursor:pointer;transition:all 0.2s;font-weight:600;color:var(--text);border:1px solid transparent;font-size:1.2em;}
.mx-table td:hover{background:rgba(56,189,248,0.2);transform:scale(1.12);}
.mx-table td.hl{background:rgba(244,114,182,0.25)!important;border-color:var(--c1);box-shadow:0 0 18px rgba(244,114,182,0.4);animation:mxPulse 0.8s ease-in-out infinite;}
.mx-table td.filled{background:rgba(52,211,153,0.38)!important;color:#065f46;font-weight:800;cursor:default;}

/* 四选一按钮 */
.mx-opts{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;}
.mx-opt{padding:20px 40px;border-radius:20px;background:var(--c3);color:white;font-weight:700;font-size:1.7em;cursor:pointer;transition:all 0.25s;border:2px solid rgba(255,255,255,0.28);min-width:100px;text-align:center;}
.mx-opt:hover{transform:translateY(-3px);box-shadow:0 10px 22px rgba(56,189,248,0.4);}
.mx-opt.ok{background:var(--c2)!important;}
.mx-opt.bad{animation:cardShake 0.4s ease-in-out;background:#ef4444!important;}
/* 矩阵单元格闪烁动画 */
@keyframes mxPulse{0%,100%{box-shadow:0 0 12px rgba(244,114,182,0.3);transform:scale(1);}50%{box-shadow:0 0 28px rgba(244,114,182,0.65);transform:scale(1.08);}}

/* ================================================================
   应用模式 #applyScreen · 观天/测地/算人 场景化问答
================================================================ */
#applyScreen{background:linear-gradient(180deg,#fef7ed 0%,#f8fafc 40%,#f0fdf4 100%);}
.apply-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:36px 56px;}
.apply-card{
  background:white;border-radius:32px;padding:40px 60px 36px;
  box-shadow:0 6px 36px rgba(0,0,0,0.06);display:flex;flex-direction:column;align-items:center;gap:22px;
  min-width:500px;max-width:720px;
}
.apply-scene{font-size:2.4em;margin-bottom:2px;}
.apply-q{font-size:2.8em;font-weight:800;color:#334155;text-align:center;line-height:1.5;}
.apply-input-row{display:flex;align-items:center;gap:18px;}
.apply-input{
  width:220px;padding:18px 28px;border-radius:16px;border:3px solid #e2e8f0;
  font-size:2.8em;font-weight:700;text-align:center;outline:none;color:#334155;background:#f8fafc;
}
.apply-input:focus{border-color:#f59e0b;box-shadow:0 0 22px rgba(245,158,11,0.18);background:white;}
.apply-input::-webkit-outer-spin-button,.apply-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.apply-input{-moz-appearance:textfield;appearance:textfield;}
.apply-btn{
  font-size:1.4em;font-weight:800;padding:18px 40px;border-radius:16px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#f59e0b,#d97706);color:white;
  box-shadow:0 6px 22px rgba(245,158,11,0.35);transition:all 0.25s;
}
.apply-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(245,158,11,0.4);}
.apply-msg{min-height:40px;font-size:1.3em;font-weight:700;text-align:center;}
.apply-progress{width:100%;max-width:600px;height:10px;background:#e2e8f0;border-radius:5px;overflow:hidden;flex-shrink:0;}
.apply-progress-inner{height:100%;background:linear-gradient(90deg,#f59e0b,#34d399);border-radius:5px;transition:width 0.4s;}

/* ================================================================
   结算画面 #overScreen
================================================================ */
#overScreen{align-items:center;justify-content:center;background:linear-gradient(180deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);padding:56px 48px;gap:22px;}
#overScreen h1{font-size:5.5em;color:white;}
.over-score{font-size:4.8em;font-weight:900;color:#fbbf24;text-shadow:0 0 50px rgba(251,191,36,0.65);}
.over-stats{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;max-width:700px;}
.over-stat{background:rgba(255,255,255,0.08);padding:18px 36px;border-radius:18px;color:white;font-size:1.35em;font-weight:600;}
.over-msg{color:rgba(255,255,255,0.78);font-size:1.6em;text-align:center;}
@keyframes popIn{0%{transform:scale(0.8);opacity:0;}70%{transform:scale(1.04);}100%{transform:scale(1);opacity:1;}}
.pop-in{animation:popIn 0.4s ease-out;}
</style>
</head>
<body>

<script>
// ================================================================
// 全局状态对象 cc_S —— 管理打怪模式的所有运行时数据
// 字段：min/max(口诀范围) time(剩余秒) score(分数) level(关卡)
//       combo/maxCombo(连击) correct/wrong(计数) bossHp(血量)
//       q(当前题目) timer(定时器) mode/subMode(模式标记)
// ================================================================
const cc_S={min:1,max:9,time:60,score:0,level:1,combo:0,maxCombo:0,correct:0,wrong:0,bossHp:100,bossMaxHp:100,q:null,timer:null,mode:'',subMode:''};

// Boss怪兽表情池：每道新题随机选一个，增加趣味性
const cc_bossEmojis=['👾','👻','🐲','🦖','👹','🎃','👽','💀','🐉','🤖'];

// document.body 快捷引用，用于全局DOM操作（如撒花）
const cc_BODY=document.body;

// ================================================================
// 屏幕切换 —— 隐藏全部 .screen，显示目标，清除旧定时器
// ================================================================
function showScreen(id){
  const map={menu:'menuScreen',memory:'memoryScreen',practice:'practiceScreen',battle:'battleScreen',match:'matchScreen',matrix:'matrixScreen',apply:'applyScreen',over:'overScreen'};
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(map[id]||id);
  if(el){el.classList.add('active');el.scrollTop=0;}
  // 清除全部模式的定时器，避免后台继续运行（修复内存泄漏）
  [cc_S.timer,cc_M.timer,cc_MX.timer,cc_AP.timer].forEach(t=>{if(t)clearInterval(t);});
  cc_S.timer=null;cc_M.timer=null;cc_MX.timer=null;cc_AP.timer=null;
}

// ================================================================
// Web Audio API 音效系统
// ac() —— 懒初始化 AudioContext（首次用户交互后才激活）
// beep(f,d,t,v) —— 播放单频音 (频率Hz, 时长ms, 波形, 音量0~1)
// sfxOk/sfxNo/sfxWin —— 正确/错误/胜利组合琶音
// ================================================================
let cc_actx=null;
function ac(){if(!cc_actx)cc_actx=new(window.AudioContext||window.webkitAudioContext)();return cc_actx;}
function beep(f,d,t='sine',v=0.1){try{const o=ac().createOscillator(),g=ac().createGain();o.connect(g);g.connect(ac().destination);o.type=t;o.frequency.value=f;g.gain.value=v;o.start();setTimeout(()=>o.stop(),d);}catch(e){}}
function sfxOk(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,150),i*70));}
function sfxNo(){[392,349,311].forEach((f,i)=>setTimeout(()=>beep(f,200,'triangle'),i*90));}
function sfxWin(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,220),i*80));}


// ================================================================
// 儿童语音朗读 —— Web Speech API
// pitch=1.7 温柔小女孩声线（成人1.0为基准，偏低更柔和）
// rate=0.70 慢语速，从容不急促，适合儿童跟读
// 优先搜索中文小女孩语音名（Xiaoxiao/Yaoyao等），回退用任意中文
// ================================================================
function speak(text,pitch=1.7){
  if(!('speechSynthesis' in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.rate=0.70;u.pitch=pitch;u.volume=1;
  const vs=speechSynthesis.getVoices();
  // 搜索中文小女孩语音（优先温柔女童声线）
  const kid=vs.find(v=>v.lang.startsWith('zh')&&(
    v.name.includes('Xiaoxiao')||v.name.includes('Xiaoyi')||v.name.includes('Yunxi')||
    v.name.includes('Yaoyao')||v.name.includes('Xiaobei')||v.name.includes('TingTing')||
    v.name.includes('Xiaohan')||v.name.includes('Xiaomeng')||v.name.includes('Yunyang')||
    v.name.includes('Xiaochen')||v.name.includes('Xiaonan')||
    v.name.includes('Tiantian')||v.name.includes('Huihui')||v.name.includes('Yunyun')
  ));
  if(kid){u.voice=kid;}

// 数字转中文
function cn(n){return cc_CN[n]||String(n);}

// 生成算式朗读文本：小九九口诀格式
//   r≤9  → "二四得八"    r=10 → "二五得十"    r≥11 → "三八二十四"
function eqText(a,b,r){if(a<=9&&b<=9)return`${cn(a)}${cn(b)}${r<=9?`得${cn(r)}`:r===10?'得十':cn(r)}`;return`${cn(a)}乘以${cn(b)}等于${cn(r)}`;}

// ================================================================
// 记忆模式
// buildMem(sub) —— 根据子模式生成算式卡片
//   顺次/倒背：三角形堆叠，左对齐，从上到下逐行展开
//      算法：第i行包含从min到i的所有j列（j×i）
//      倒背：行序反转 + 每行内反转
//   乱序：全排列打乱，自适应网格
// ================================================================
function startMemory(sub){
  cc_S.mode='memory';cc_S.subMode=sub;
  document.getElementById('memTitle').textContent={seq:'顺次记忆',rev:'倒背如流',rand:'乱序记忆'}[sub];
  showScreen('memory');buildMem(sub);
}
function buildMem(sub){
  const mb=document.getElementById('memBody');
  const rangeSize=cc_S.max-cc_S.min+1;
  const compact=rangeSize>12; // 范围>12自动启用紧凑模式
  mb.className='mem-body'+(compact?' mem-compact':'');
  const d=`范围 ${cc_S.min}~${cc_S.max}`;
  let h=`<h2>${sub==='seq'?'📖 顺次记忆':sub==='rev'?'🔄 倒背如流':'🎲 乱序记忆'}</h2><p class="desc">${d} · 点击卡片听发音 👆</p>`;
  if(sub==='seq'||sub==='rev'){
    // 计算三角形总组块数：n*(n+1)/2，n=rangeSize
    const triCount=rangeSize*(rangeSize+1)/2;
    if(triCount<=45){
      // ≤45个组块：左对齐三角形堆叠
      const rows=[];for(let i=cc_S.min;i<=cc_S.max;i++){const r=[];for(let j=cc_S.min;j<=i;j++)r.push({a:j,b:i,r:j*i});rows.push(r);}
      if(sub==='rev')rows.reverse();
      const maxCols=rangeSize;
      h+=`<div class="mem-triangle" style="grid-template-columns:repeat(${maxCols},minmax(0,1fr))">`;
      for(const row of rows){if(sub==='rev')row.reverse();for(const e of row)h+=`<div class="mem-cell" onclick="onMCell(this,${e.a},${e.b},${e.r})">${e.a}×${e.b}=${e.r}</div>`;}
      h+='</div>';
    }else{
      // >45个组块：改用全矩阵网格排列
      const eqs=[];for(let i=cc_S.min;i<=cc_S.max;i++)for(let j=cc_S.min;j<=cc_S.max;j++)eqs.push({a:i,b:j,r:i*j});
      if(sub==='rev')eqs.reverse();
      h+='<div class="mem-rand">';for(const e of eqs)h+=`<div class="mem-cell" onclick="onMCell(this,${e.a},${e.b},${e.r})">${e.a}×${e.b}=${e.r}</div>`;h+='</div>';
    }
  }else{
    const eqs=[];for(let i=cc_S.min;i<=cc_S.max;i++)for(let j=cc_S.min;j<=cc_S.max;j++)eqs.push({a:i,b:j,r:i*j});eqs.sort(()=>Math.random()-0.5);
    h+='<div class="mem-rand">';for(const e of eqs)h+=`<div class="mem-cell" onclick="onMCell(this,${e.a},${e.b},${e.r})">${e.a}×${e.b}=${e.r}</div>`;h+='</div>';
  }
  mb.innerHTML=h;
  const fb=document.querySelector('#memoryScreen .mem-footer'),old=document.getElementById('readAllBtn');if(old)old.remove();
  const btn=document.createElement('button');btn.id='readAllBtn';btn.className='btn btn-b';btn.textContent='🔊 朗读全部';btn.onclick=()=>readAllMem();fb.insertBefore(btn,fb.firstChild);
}
function onMCell(el,a,b,r){document.querySelectorAll('.mem-cell.reading').forEach(c=>c.classList.remove('reading'));el.classList.add('reading');speak(eqText(a,b,r));setTimeout(()=>el.classList.remove('reading'),2800);}

let cc_ridx=0,cc_reqs=[],cc_rding=false;
function readAllMem(){if(cc_rding){speechSynthesis.cancel();cc_rding=false;document.getElementById('readAllBtn').textContent='🔊 朗读全部';return;}const cs=document.querySelectorAll('.mem-cell');cc_reqs=[];cs.forEach(c=>{const t=c.textContent.match(/(\d+)\s*×\s*(\d+)\s*=\s*(\d+)/);if(t)cc_reqs.push({a:+t[1],b:+t[2],r:+t[3],el:c});});cc_ridx=0;cc_rding=true;document.getElementById('readAllBtn').textContent='⏹️ 停止';readNxt();}

// 随堂练习模式（记忆模式专属）
// startPractice() —— 根据当前子模式生成题目列表
//   seq: 顺次排列(与三角形堆叠同序)
//   rev: 倒序排列
//   rand: 全量打乱
// pracAnswer() —— 单题判对错→即时反馈→0.8秒后下一题
// endPractice() —— 全部答完→跳结算画面
// ================================================================
let cc_P={eqs:[],idx:0,score:0,correct:0,wrong:0,sub:''};
function startPractice(){
  const sub=cc_S.subMode;cc_P.sub=sub;
  cc_P.score=0;cc_P.correct=0;cc_P.wrong=0;cc_P.idx=0;
  cc_P.eqs=[];
  if(sub==='seq'||sub==='rev'){
    // 与记忆模式三角形排列一致：逐行生成j×i (j≤i)
    for(let i=cc_S.min;i<=cc_S.max;i++)for(let j=cc_S.min;j<=i;j++)cc_P.eqs.push({a:j,b:i,r:j*i});
    if(sub==='rev')cc_P.eqs.reverse();
  }else{
    // 乱序：全排列打乱
    for(let i=cc_S.min;i<=cc_S.max;i++)for(let j=cc_S.min;j<=cc_S.max;j++)cc_P.eqs.push({a:i,b:j,r:i*j});
    cc_P.eqs.sort(()=>Math.random()-0.5);
  }
  document.getElementById('pracTitle').textContent={seq:'顺次练习',rev:'倒背练习',rand:'乱序练习'}[sub];
  document.getElementById('pracScore').textContent='0';
  showScreen('practice');showPracQ();
}
function showPracQ(){
  if(cc_P.idx>=cc_P.eqs.length){endPractice();return;}
  const eq=cc_P.eqs[cc_P.idx];
  document.getElementById('pracQ').textContent=`${eq.a} × ${eq.b} = ?`;
  document.getElementById('pracInput').value='';document.getElementById('pracInput').focus();
  document.getElementById('pracMsg').textContent='';
  document.getElementById('pracStats').textContent=`第 ${cc_P.idx+1} / ${cc_P.eqs.length} 题`;
  document.getElementById('pracProgress').style.width=(cc_P.idx/cc_P.eqs.length*100)+'%';
}
function pracAnswer(){
  const inp=document.getElementById('pracInput'),v=parseInt(inp.value);
  if(isNaN(v)||!/^\d+$/.test(inp.value)){document.getElementById('pracMsg').innerHTML='<span style="color:#f472b6;">请输入数字哦~</span>';return;}
  const eq=cc_P.eqs[cc_P.idx];
  if(v===eq.r){
    cc_P.score+=10;cc_P.correct++;document.getElementById('pracScore').textContent=cc_P.score;
    document.getElementById('pracMsg').innerHTML='<span style="color:#34d399;">✅ 正确！</span>';sfxOk();
  }else{
    cc_P.wrong++;document.getElementById('pracMsg').innerHTML=`<span style="color:#fbbf24;">❌ 答案是 ${eq.r}</span>`;sfxNo();
  }
  cc_P.idx++;document.getElementById('pracProgress').style.width=(cc_P.idx/cc_P.eqs.length*100)+'%';
  setTimeout(showPracQ,800);
}
function endPractice(){showOver({score:cc_P.score,correct:cc_P.correct,wrong:cc_P.wrong,level:1,maxCombo:0});}

// 武器库
const cc_WEAPONS=[
  {icon:'⚡',txt:'闪电',dur:350,exp:1.0,cols:5},
  {icon:'🚀',txt:'火箭',dur:500,exp:1.5,cols:8},

function fireAnswer(){
  const inp=document.getElementById('qInput'),v=parseInt(inp.value);

    setTimeout(genBQ,550);

// 多武器发射动画
// type: 武器配置对象  hit: true=命中 / false=掠过失手
function fireProjectile(w,hit){
  const area=document.getElementById('battleArea'),boss=document.getElementById('bossEmoji'),btn=document.getElementById('fireBtn');
  const aR=area.getBoundingClientRect(),bR=boss.getBoundingClientRect(),fR=btn.getBoundingClientRect();
  const sx=fR.left-aR.left+fR.width/2,sy=fR.top-aR.top;
  const bx=bR.left-aR.left+bR.width/2,by=bR.top-aR.top+bR.height/2;
  const ex=hit?bx:bx+(Math.random()*160-80),ey=hit?by:by-90;
  const b=document.createElement('div');b.className='bolt-fly';b.textContent=w.icon;
  b.style.left=sx+'px';b.style.top=sy+'px';b.style.transform='translate(-50%,-50%)';
  b.style.fontSize=(w.icon==='🔫'?'1.6em':w.icon==='💣'?'3em':'2.8em');
  area.appendChild(b);
  const dur=w.dur,st=performance.now();
  function anim(ct){
    const p=Math.min((ct-st)/dur,1),ep=1-Math.pow(1-p,3);
    b.style.left=(sx+(ex-sx)*ep)+'px';b.style.top=(sy+(ey-sy)*ep)+'px';
    b.style.transform='translate(-50%,-50%)';b.style.opacity=1-ep*0.3;
    if(p<1)requestAnimationFrame(anim);
    else{b.remove();if(hit){
      const fl=document.createElement('div');fl.className='bolt-hit';fl.textContent='💥';
      fl.style.fontSize=(w.exp*8)+'em';
      fl.style.left=bx+'px';fl.style.top=by+'px';fl.style.transform='translate(-50%,-50%)';
      area.appendChild(fl);setTimeout(()=>fl.remove(),700);
      const emojis=['💫','✨','⭐','🔥','💢'];
      for(let i=0;i<w.cols;i++){const pn=document.createElement('div');pn.className='boom-particle';
        pn.textContent=emojis[Math.floor(Math.random()*5)];pn.style.left=bx+'px';pn.style.top=by+'px';
        pn.style.transform='translate(-50%,-50%)';const a=Math.random()*Math.PI*2,d=35+Math.random()*80;
        pn.style.setProperty('--dx',Math.cos(a)*d+'px');pn.style.setProperty('--dy',Math.sin(a)*d+'px');
        area.appendChild(pn);setTimeout(()=>pn.remove(),800);}
      boss.classList.add('hit');setTimeout(()=>boss.classList.remove('hit'),500);
      const sf=document.createElement('div');sf.className='score-pop';sf.textContent='+10';
      sf.style.left=bx+'px';sf.style.top=by+'px';area.appendChild(sf);setTimeout(()=>sf.remove(),1100);
      if(cc_S.combo>=3){const cp=document.createElement('div');cp.className='combo-pop';
        cp.textContent=`🔥 ${cc_S.combo}连击！`;cp.style.left='50%';cp.style.top='45%';
        cp.style.transform='translate(-50%,-50%)';area.appendChild(cp);setTimeout(()=>cp.remove(),1200);}
    }}
  }requestAnimationFrame(anim);
}

// ================================================================
// 消消乐模式 · 按乘积匹配
// genMRound() —— 生成n对算式-答案卡片，6×6固定网格排列
//   去重Key："a_b"保证算式不重复，但允许不同算式产生相同乘积
//   每对含算式卡"3×7"和答案卡"21"，随机排列
// pickM(el,card) —— 两次点击配对：同乘积+异类型=成功
//   规则：任意算式卡可以和任意同乘积答案卡配对（适合儿童直观理解）
// ================================================================
let cc_M={pairs:[],picked:null,done:0,total:0,score:0,level:1,time:0,timer:null,correct:0,wrong:0};
function initMatch(){cc_M.score=0;cc_M.level=1;cc_M.time=parseInt(document.getElementById('mtTime').value);if(isNaN(cc_M.time))cc_M.time=60;document.getElementById('mScore').textContent='0';document.getElementById('mLevel').textContent='1';genMRound();startMTimer();}
function genMRound(){
  const range=cc_S.max-cc_S.min+1;
  const n=Math.max(3,Math.min(18,range*3));
  cc_M.pairs=[];cc_M.picked=null;cc_M.done=0;cc_M.total=n;
  const used=new Set();
  for(let i=0;i<n;i++){
    let a,b,r,k;let tries=0;
    do{a=rand(cc_S.min,cc_S.max);b=rand(cc_S.min,cc_S.max);r=a*b;k=`${a}_${b}`;tries++;}
    while(used.has(k)&&tries<500);
    if(tries>=500)break;
    used.add(k);cc_M.pairs.push({a,b,r,id:i});
  }
  cc_M.total=cc_M.pairs.length;
  // 卡片存储乘积r用于匹配，不再依赖pid
  const cards=[];cc_M.pairs.forEach(p=>{cards.push({t:'eq',txt:`${p.a} × ${p.b}`,r:p.r});cards.push({t:'ans',txt:`${p.r}`,r:p.r});});cards.sort(()=>Math.random()-0.5);
  const g=document.getElementById('matchGrid');g.innerHTML='';cards.forEach(c=>{const el=document.createElement('div');el.className='m-card';el.textContent=c.txt;el.onclick=()=>pickM(el,c);g.appendChild(el);});updMDots();
}
function updMDots(){const d=document.getElementById('matchDots');d.innerHTML='';for(let i=0;i<cc_M.total;i++){const dot=document.createElement('div');dot.className='match-dot'+(i<cc_M.done?' done':'');d.appendChild(dot);}}
function pickM(el,card){if(el.classList.contains('paired')||el.classList.contains('picked'))return;if(!cc_M.picked){cc_M.picked={el,card};el.classList.add('picked');return;}const f=cc_M.picked;if(f.card.r===card.r&&f.card.t!==card.t){f.el.classList.remove('picked');f.el.classList.add('paired');el.classList.add('paired');cc_M.done++;cc_M.score+=10;cc_M.correct++;document.getElementById('mScore').textContent=cc_M.score;updMDots();sfxOk();if(cc_M.done>=cc_M.total){cc_M.level++;document.getElementById('mLevel').textContent=cc_M.level;cc_M.time=Math.min(cc_M.time+15,getTime());setTimeout(genMRound,600);}}else{f.el.classList.add('wrong');el.classList.add('wrong');cc_M.wrong++;sfxNo();setTimeout(()=>{f.el.classList.remove('wrong','picked');el.classList.remove('wrong');},400);}cc_M.picked=null;}
function startMTimer(){if(cc_M.timer)clearInterval(cc_M.timer);if(cc_M.time<=0){document.getElementById('mTimer').textContent='∞';return;}cc_M.timer=setInterval(()=>{cc_M.time--;document.getElementById('mTimer').textContent=cc_M.time;document.getElementById('mTimerTag').classList.toggle('warn',cc_M.time<=10);if(cc_M.time<=0){clearInterval(cc_M.timer);endMatch();}},1000);}
function endMatch(){if(cc_M.timer)clearInterval(cc_M.timer);showOver({score:cc_M.score,correct:cc_M.correct,wrong:cc_M.wrong,level:cc_M.level,maxCombo:0});}

// ================================================================
// 矩阵填空模式
// genMXRound() —— 生成完整乘法矩阵表（所有格子初始为空）
// nextMXQ() —— 随机选空格高亮，生成4个选项（1正确+3干扰）
// pickMX() —— 正确填充绿色，错误红色抖动
// ================================================================
let cc_MX={matrix:[],filled:new Set(),target:null,score:0,level:1,time:0,timer:null,correct:0,wrong:0};
function initMatrix(){cc_MX.score=0;cc_MX.level=1;cc_MX.time=parseInt(document.getElementById('mxtTime').value);if(isNaN(cc_MX.time))cc_MX.time=60;document.getElementById('mxScore').textContent='0';document.getElementById('mxLevel').textContent='1';genMXRound();startMXTimer();}
function genMXRound(){cc_MX.matrix=[];cc_MX.filled=new Set();cc_MX.target=null;
  // 从口诀范围内随机选取最多9个行和9个列（不足则全取）
  const all=[];for(let i=cc_S.min;i<=cc_S.max;i++)all.push(i);
  const pick=(arr,n)=>{if(arr.length<=n)return[...arr];const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.slice(0,n).sort((a,b)=>a-b);};
  const rs=pick(all,9);
  const cs=pick(all,9);
  let t='<table class="mx-table"><tr><th class="corner">×</th>';
  cs.forEach(c=>t+=`<th>${c}</th>`);t+='</tr>';
  rs.forEach(r=>{t+=`<tr><th class="rhead">${r}</th>`;
    cs.forEach(c=>{const v=r*c;cc_MX.matrix.push({r,c,v,k:`${r}_${c}`});t+=`<td id="mx_${r}_${c}"></td>`;});
    t+='</tr>';});
  t+='</table>';document.getElementById('matrixGrid').innerHTML=t;nextMXQ();}
function nextMXQ(){document.querySelectorAll('.mx-table td.hl').forEach(c=>c.classList.remove('hl'));const empty=cc_MX.matrix.filter(m=>!cc_MX.filled.has(m.k));if(empty.length===0){cc_MX.level++;document.getElementById('mxLevel').textContent=cc_MX.level;cc_MX.time=Math.min(cc_MX.time+15,getTime());setTimeout(genMXRound,500);return;}cc_MX.target=empty[Math.floor(Math.random()*empty.length)];document.getElementById('matrixQ').textContent=`${cc_MX.target.r} × ${cc_MX.target.c} = ?`;const cell=document.getElementById(`mx_${cc_MX.target.r}_${cc_MX.target.c}`);if(cell)cell.classList.add('hl');genMXOpts(cc_MX.target.v);}
function genMXOpts(ans){const opts=new Set([ans]);let safe=0;while(opts.size<4&&safe<200){const w=ans+Math.floor(Math.random()*20)-10;if(w>0)opts.add(w);safe++;}const arr=[...opts].sort(()=>Math.random()-0.5);const c=document.getElementById('matrixOpts');c.innerHTML='';arr.forEach(o=>{const el=document.createElement('div');el.className='mx-opt';el.textContent=o;el.onclick=()=>pickMX(el,o,ans);c.appendChild(el);});}
function pickMX(el,val,ans){if(el.classList.contains('ok')||el.classList.contains('bad'))return;if(val===ans){el.classList.add('ok');const t=cc_MX.target;const cell=document.getElementById(`mx_${t.r}_${t.c}`);if(cell){cell.textContent=ans;cell.classList.remove('hl');cell.classList.add('filled');}cc_MX.filled.add(t.k);cc_MX.score+=10;cc_MX.correct++;document.getElementById('mxScore').textContent=cc_MX.score;sfxOk();setTimeout(nextMXQ,500);}else{el.classList.add('bad');cc_MX.wrong++;sfxNo();setTimeout(()=>el.classList.remove('bad'),400);}}
function startMXTimer(){if(cc_MX.timer)clearInterval(cc_MX.timer);if(cc_MX.time<=0){document.getElementById('mxTimer').textContent='∞';return;}cc_MX.timer=setInterval(()=>{cc_MX.time--;document.getElementById('mxTimer').textContent=cc_MX.time;document.getElementById('mxTimerTag').classList.toggle('warn',cc_MX.time<=10);if(cc_MX.time<=0){clearInterval(cc_MX.timer);endMatrix();}},1000);}
function endMatrix(){if(cc_MX.timer)clearInterval(cc_MX.timer);showOver({score:cc_MX.score,correct:cc_MX.correct,wrong:cc_MX.wrong,level:cc_MX.level,maxCombo:0});}

// ================================================================
// 应用模式 · 观天/测地/算人 场景化问答
// startApply(sub) —— 根据子场景生成应用题，随机选取场景模板
// showApQ() —— 渲染场景化文字题目
// apAnswer() —— 判断答案→即时反馈→下一题
// ================================================================
let cc_AP={eqs:[],idx:0,score:0,correct:0,wrong:0,sub:'',time:0,timer:null};
const cc_AP_SCENES={
  sky:{icon:'🔭',title:'观天',tpls:[
    '天上有{0}排星星✨，每排{1}颗，一共有多少颗？',
    '夜空中{0}个星座🌟，每个星座有{1}颗亮星，共有几颗？',
    '望远镜看到{0}颗流星💫，每颗{1}条光尾，共几条？',
    '月球上有{0}座环形山🌑，每座有{1}块岩石，共几块？',
    '天文学家发现{0}个星系🌀，每个{1}亿颗星，共几亿？',
    '夏日傍晚{0}只萤火虫🪲，每只闪{1}次光，共闪几次？',
  ]},
  land:{icon:'🌾',title:'测地',tpls:[
    '一块田地长{0}米📏，宽{1}米，面积是多少㎡？',
    '果园有{0}排果树🌳，每排{1}棵，一共多少棵？',
    '{0}块菜地🥬，每块收{1}斤蔬菜，一共多少斤？',
    '花园有{0}个花坛🌻，每坛{1}朵花，一共多少朵？',
    '{0}方池塘🐟，每方养{1}条鱼，一共多少条？',
    '山坡上{0}层梯田🌿，每层{1}株苗，共几株？',
  ]},
  people:{icon:'👨‍👩‍👧‍👦',title:'算人',tpls:[
    '{0}个小朋友👧，每人{1}块糖🍬，一共几块？',
    '{0}张桌子🪑，每张坐{1}人，一共坐几人？',
    '{0}个班级🏫，每班{1}名学生，一共几名？',
    '{0}个家庭🏠，每家{1}口人，一共几口人？',
    '运动会{0}支队伍🏃，每队{1}人，一共几人？',
    '{0}盒铅笔✏️，每盒{1}支，一共几支？',
  ]},
};
function startApply(sub){
  cc_S.subMode='apply_'+sub;
  cc_AP.sub=sub;cc_AP.score=0;cc_AP.correct=0;cc_AP.wrong=0;cc_AP.idx=0;
  cc_AP.time=parseInt(document.getElementById('apTime').value);
  if(isNaN(cc_AP.time))cc_AP.time=0;
  const scene=cc_AP_SCENES[sub];
  document.getElementById('applyTitle').textContent=scene.icon+' '+scene.title;
  document.getElementById('apScene').textContent=scene.icon;
  document.getElementById('apScore').textContent='0';
  cc_AP.eqs=[];
  const rangeSize=cc_S.max-cc_S.min+1;
  const n=Math.min(20,Math.max(5,rangeSize*2));
  const used=new Set();
  for(let i=0;i<n;i++){
    let a,b,k,tries=0;
    do{a=rand(cc_S.min,cc_S.max);b=rand(cc_S.min,cc_S.max);k=`${a}_${b}`;tries++;}
    while(used.has(k)&&tries<200);
    if(tries>=200)break;
    used.add(k);
    const tplIdx=Math.floor(Math.random()*scene.tpls.length);
    cc_AP.eqs.push({a,b,r:a*b,k,tpl:scene.tpls[tplIdx]});
  }
  cc_AP.eqs.sort(()=>Math.random()-0.5);
  showScreen('apply');showApQ();
}
function showApQ(){
  if(cc_AP.idx>=cc_AP.eqs.length){endApply();return;}
  const eq=cc_AP.eqs[cc_AP.idx];
  document.getElementById('apQ').textContent=eq.tpl.replace('{0}',eq.a).replace('{1}',eq.b);
  document.getElementById('apInput').value='';document.getElementById('apInput').focus();
  document.getElementById('apMsg').textContent='';
  document.getElementById('apProgress').style.width=(cc_AP.idx/cc_AP.eqs.length*100)+'%';
}
function apAnswer(){
  const inp=document.getElementById('apInput'),v=parseInt(inp.value);
  if(isNaN(v)||!/^\d+$/.test(inp.value)){document.getElementById('apMsg').innerHTML='<span style="color:#f59e0b;">请输入数字哦~</span>';return;}
  const eq=cc_AP.eqs[cc_AP.idx];
  if(v===eq.r){
    cc_AP.score+=10;cc_AP.correct++;
    document.getElementById('apScore').textContent=cc_AP.score;
    document.getElementById('apMsg').innerHTML='<span style="color:#34d399;">✅ 正确！太厉害了！🌟</span>';
    sfxOk();
  }else{
    cc_AP.wrong++;
    document.getElementById('apMsg').innerHTML=`<span style="color:#fbbf24;">❌ 答案是 ${eq.r}</span>`;
    sfxNo();
  }
  cc_AP.idx++;document.getElementById('apProgress').style.width=(cc_AP.idx/cc_AP.eqs.length*100)+'%';
  setTimeout(showApQ,1000);
}
function endApply(){if(cc_AP.timer)clearInterval(cc_AP.timer);showOver({score:cc_AP.score,correct:cc_AP.correct,wrong:cc_AP.wrong,level:1,maxCombo:0});}

// ================================================================
// 结算画面 —— 统计分数、正确率、最高连击，给出鼓励语
// ================================================================
function showOver(o){
  [cc_S.timer,cc_M.timer,cc_MX.timer].forEach(t=>{if(t)clearInterval(t);});
  const st=o||{score:cc_S.score,correct:cc_S.correct,wrong:cc_S.wrong,level:cc_S.level,maxCombo:cc_S.maxCombo};
  const total=st.correct+st.wrong,acc=total>0?Math.round(st.correct/total*100):0;
  document.getElementById('overScore').textContent=`⭐ ${st.score} 分`;
  document.getElementById('overStats').innerHTML=`<div class="over-stat">✅ 正确 ${st.correct}</div><div class="over-stat">❌ 错误 ${st.wrong}</div><div class="over-stat">🎯 正确率 ${acc}%</div><div class="over-stat">🔥 最高连击 ${st.maxCombo||0}</div>`;
  const msgs=[];if(st.level>1)msgs.push(`到达第 ${st.level} 关`);if(acc>=80)msgs.push('你真棒！🌟');else if(acc>=50)msgs.push('继续加油哦 💪');else msgs.push('去记忆模式学习一下吧 📚');
  document.getElementById('overMsg').textContent=msgs.join(' · ');
  document.getElementById('overRetry').onclick=()=>{const sm=cc_S.subMode;if(sm==='match')startGame('match');else if(sm==='matrix')startGame('matrix');else if(sm==='seq'||sm==='rev'||sm==='rand')startPractice();else if(sm.startsWith('apply_'))startApply(sm.slice(6));else startGame('battle');};
  showScreen('over');if(acc>=80)setTimeout(()=>confetti(35),300);
}

// ================================================================
// 工具函数
// ================================================================
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
// 全局快捷键：Enter发射答案（仅打怪模式）
document.addEventListener('keydown',e=>{if(e.key==='Enter'){if(document.getElementById('practiceScreen').classList.contains('active'))pracAnswer();else if(document.getElementById('battleScreen').classList.contains('active'))fireAnswer();else if(document.getElementById('applyScreen').classList.contains('active'))apAnswer();}});

// ================================================================
// 启动
// ================================================================
populateSel();showScreen('menu');
</script>
